<!DOCTYPE html>
<html>

  {% include head.html %}

  <body>

    {% include header.html %}

    <div class="page-content">
      <div class="wrapper">

              <p class="profile-title">Master's Student in Data Science</p>
              <p class="profile-institution">Indiana University, Bloomington</p>
              <div class="contact-icons">

    {% include footer.html %}
